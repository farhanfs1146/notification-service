spring.application.name=notification-service

server.port=8380

spring.datasource.url=jdbc:postgresql://localhost:5432/SpringBootLearning
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate schema
spring.datasource.hikari.schema=notification_db

# Flyway schema (CRITICAL)
spring.flyway.schemas=notification_db
spring.flyway.default-schema=notification_db

# Flyway migration path
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# mail configurations
spring.mail.username = its17@gmail.com


# Redis configuration
#spring.data.redis.host=localhost
#spring.data.redis.port=6479
#spring.data.redis.timeout=60000
#spring.cache.type=redis
#spring.cache.redis.time-to-live=3600000
#spring.cache.redis.cache-null-values=false

# Swagger configuration
#springdoc.api-docs.path=/api-docs
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.persist-authorization=true
#springdoc.swagger-ui.try-it-out-enabled=true
#springdoc.swagger-ui.operations-sorter=alpha
#springdoc.swagger-ui.filter=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=notification-service-id
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.notification_service.event.EmployeeEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*


